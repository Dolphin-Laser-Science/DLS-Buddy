# Pytest configuration for the DLS Buddy regression suite.
#
# Run everything from the repo root:
#     python -m pytest
# Fast inner loop (skip the slow Monte-Carlo and the GUI tiers):
#     python -m pytest -m "not slow and not gui"
# One module / one test:
#     python -m pytest tests/test_dls.py -k cumulant
# Parallel (pytest-xdist) — helps most on the slow Monte-Carlo tier:
#     python -m pytest -n auto            (or:  python -m pytest -m slow -n auto)
#
# `pythonpath` puts the repo root (for `analysis`, `physics`, `core`, ...) and the
# `tests` dir (for `from fixtures.synthetic_dls import ...`) on sys.path, so the
# suite runs without any PYTHONPATH juggling.
[pytest]
testpaths = tests
pythonpath = . tests
addopts = -ra
markers =
    slow: Monte-Carlo / CONTIN-heavy checks; excluded from the fast inner loop.
    gui: needs PySide6 (runs headless under QT_QPA_PLATFORM=offscreen); opt-in.
    realdata: reads a committed instrument file from test-data/.
# Known-benign numeric warnings from ill-conditioned corners the code already
# guards on (empty-bin chi^2 in fit_count_rate_histogram; Berry dropping a
# non-positive Kc/dR). Silenced so a green run stays readable.
filterwarnings =
    ignore:divide by zero encountered:RuntimeWarning
    ignore:invalid value encountered:RuntimeWarning
